name: Terraform Pipeline

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:

  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/environments/dev
          soft_fail: true
          format: json
          additional_args: --out tfsec-report.json

      - name: Upload tfsec report
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-report
          path: tfsec-report.json

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/environments/dev
          framework: terraform
          output_format: json
          output_file_path: checkov-report.json
          soft_fail: true

      - name: Upload checkov report
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-report.json

      - name: Run Trivy Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          hide-progress: true
          format: json
          output: trivy-report.json

      - name: Upload trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Upload tfsec report to DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "engagement=${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}" \
          -F "scan_type=Tfsec Scan" \
          -F "file=@tfsec-report.json" \
          -F "active=true" \
          -F "verified=true"

      - name: Upload checkov report to DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "engagement=${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}" \
          -F "scan_type=Checkov Scan" \
          -F "file=@checkov-report.json" \
          -F "active=true" \
          -F "verified=true"

      - name: Upload trivy report to DefectDojo
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
          -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
          -F "engagement=${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}" \
          -F "scan_type=Trivy Config Scan" \
          -F "file=@trivy-report.json" \
          -F "active=true" \
          -F "verified=true"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve